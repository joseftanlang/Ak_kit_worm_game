<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worm Game — WebAssembly</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>Worm Game</h1>
      <p class="subtitle">AK Embedded Base Kit — browser port (WebAssembly)</p>
    </header>

    <main class="main">
      <div class="display-panel">
        <canvas id="screen" width="512" height="256" aria-label="Game display 128x64"></canvas>
        <p class="hint">128×64 OLED, scaled 4×</p>
      </div>

      <div class="controls-panel">
        <section class="keys">
          <h2>Keyboard</h2>
          <table class="key-table">
            <tr><td><kbd>W</kbd> / <kbd>S</kbd></td><td>Up / Down (turn worm or menu)</td></tr>
            <tr><td><kbd>A</kbd> / <kbd>D</kbd></td><td>Mode (enter / back)</td></tr>
            <tr><td><kbd>H</kbd></td><td>Long mode (settings → menu)</td></tr>
          </table>
        </section>

        <section class="buttons">
          <h2>On-screen buttons</h2>
          <div class="btn-row">
            <button type="button" class="btn" data-key="up">▲ Up</button>
          </div>
          <div class="btn-row">
            <button type="button" class="btn" data-key="mode">◉ Mode</button>
          </div>
          <div class="btn-row">
            <button type="button" class="btn" data-key="down">▼ Down</button>
          </div>
        </section>
      </div>
    </main>

    <footer class="footer">
      <span id="status">Loading WebAssembly…</span>
    </footer>
  </div>

  <script src="js/worm_game.js"></script>
  <script src="js/main.js" type="module"></script>
</body>
</html>
